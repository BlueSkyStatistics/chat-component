<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BlueSky Chat Component</title>
  </head>
  <body>
    <div id="chat-container"></div>
    <script type="module">
      // Load Bootstrap and FontAwesome in dev mode
      import 'bootstrap/dist/css/bootstrap.min.css';
      import '@fortawesome/fontawesome-free/css/all.min.css';
      import * as bootstrap from 'bootstrap/dist/js/bootstrap.bundle.min.js';
      
      // Make bootstrap available globally
      window.bootstrap = bootstrap;
      
      import {
        initChatComponent,
        LocalStorageProvider,
        LocalStorageConversationProvider,
      } from '/src/main.jsx'
      window.addEventListener('DOMContentLoaded', () => {
        // In dev we explicitly opt in to the bundled storage providers so
        // the full conversation manager UI is exercised while developing.
        initChatComponent(
          'chat-container',
          new LocalStorageProvider(),
          new LocalStorageConversationProvider(),
          (err) => console.error('[dev] conversation storage error:', err),
        )
      })
    </script>
  </body>
</html>
